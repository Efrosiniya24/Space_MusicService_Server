spring:
  application:
    name: PERSONALIZATION-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/preferences
    password: 1111
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/db.changelog.xml

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: personalization
    prefer-ip-address: true
