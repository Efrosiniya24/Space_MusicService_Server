server:
  port: 8082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: MEDIA-CONTENT
  datasource:
    url: jdbc:mysql://media:3306/media
    password: 1111
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  elasticsearch:
    uris: http://elasticsearch:9200
  liquibase:
    change-log: classpath:liquibase/db.changelog.xml
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 10000MB
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: media-content
    prefer-ip-address: false

media:
  ffprobe:
    # Имя или полный путь; по умолчанию ищется в PATH (Windows/Linux). В Docker см. Dockerfile (apk add ffmpeg).
    executable: ffprobe
    timeout-seconds: 45
  import:
    unknown-artist-name: Неизвестный исполнитель
  track:
    default-genre-ids-when-empty: ""
    assign-first-catalog-genre-if-none: true
    # Строки genreHints при создании трека (из ffprobe/тегов): создать жанр в каталоге, если ещё нет (без дубликата по имени без учёта регистра).
    create-genres-from-metadata-hints: true

minio:
  url: http://minio:9000
  access-key: space24
  secret-key: 34fhj84wjfelw
  bucket: space-media
