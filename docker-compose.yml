services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - space-net

  users:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1111
      MYSQL_DATABASE: users
    ports:
      - "33307:3306"
    volumes:
      - db_users_data:/var/lib/mysql
    networks:
      - space-net

  media:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1111
      MYSQL_DATABASE: media
    ports:
      - "33308:3306"
    volumes:
      - db_media_data:/var/lib/mysql
    networks:
      - space-net

  preferences:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1111
      MYSQL_DATABASE: preferences
    ports:
      - "33309:3306"
    volumes:
      - db_pref_data:/var/lib/mysql
#    ports:
#      - "3310:3306"
    networks:
      - space-net

  eureka:
    build:
      context: ./Eureka
    container_name: eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - space-net

  users-service:
    build:
      context: .
      dockerfile: users_service/Dockerfile
    container_name: users_service
    depends_on:
      eureka:
        condition: service_started
      users:
        condition: service_started
      elasticsearch:
        condition: service_healthy

    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://users:3306/users
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1111
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    networks:
      - space-net

  auth-service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    container_name: auth_service
    depends_on:
      - eureka
      - users-service

    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - JWT_
    networks:
      - space-net

  media-content:
    build:
      context: .
      dockerfile: media-content/Dockerfile
    container_name: media-content
    depends_on:
      eureka:
        condition: service_started
      media:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      users-service:
        condition: service_started
      auth-service:
        condition: service_started
      minio:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://media:3306/media
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1111
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=space24
      - MINIO_SECRET_KEY=34fhj84wjfelw
      - MINIO_BUCKET=space-media
    networks:
      - space-net

  personalization-service:
    build:
      context: .
      dockerfile: personalization/Dockerfile
    container_name: personalization-service
    depends_on:
      - preferences
      - eureka
      - users-service
      - auth-service
      - media-content
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=personalization-service
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://preferences:3306/preferences
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1111
    networks:
      - space-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      - eureka
      - users-service
      - auth-service
      - media-content
      - personalization-service

    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
    networks:
      - space-net

  frontend:
    build:
      context: ../space_front
    container_name: space_front
    depends_on:
      - api-gateway
    ports:
      - "5173:3000"
    networks:
      - space-net

  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: space24
      MINIO_ROOT_PASSWORD: 34fhj84wjfelw
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    networks:
      - space-net

networks:
  space-net:

volumes:
  db_users_data:
  db_media_data:
  db_pref_data:
  es_data:
